[theme]
# 業務ツール向け: 落ち着いたブルー × ニュートラルグレー基調
primaryColor = "#2563EB"               # 主要アクセント (ブルー)
backgroundColor = "#F8FAFC"            # 全体背景 (ほぼ白)
secondaryBackgroundColor = "#F1F5F9"   # サイドバー・カード背景 (薄グレー)
textColor = "#0F172A"                  # 本文 (ほぼ黒のチャコール)
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
fileWatcherType = "none"
headless = true
